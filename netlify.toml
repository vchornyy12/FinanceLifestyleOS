[build]
  # base = apps/web so Netlify auto-detects Next.js (finds next.config.ts here).
  # Build command navigates up to repo root first to install all workspace deps,
  # then runs the web build. publish is relative to base.
  base    = "apps/web"
  command = "cd ../.. && pnpm install --frozen-lockfile && pnpm build --filter=web"
  publish = ".next"

[build.environment]
  NODE_VERSION            = "20"
  PNPM_VERSION            = "10"
  NEXT_TELEMETRY_DISABLED = "1"
