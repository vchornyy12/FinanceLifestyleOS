[build]
  # Install from monorepo root so pnpm workspace deps resolve correctly,
  # then build only the web app via Turbo filter.
  command = "pnpm install --frozen-lockfile && pnpm build --filter=web"
  publish = "apps/web/.next"

[build.environment]
  NODE_VERSION  = "20"
  PNPM_VERSION  = "10"
  NEXT_TELEMETRY_DISABLED = "1"

# Next.js plugin is managed by Netlify automatically (do not add it here —
# specifying it pins an old version; Netlify installs the latest from their UI).
