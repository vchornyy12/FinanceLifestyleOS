[build]
  # base = apps/web so Netlify framework detection finds next.config.ts here.
  # Build command navigates up to repo root to install all workspace deps,
  # then runs the web build. publish is relative to base.
  base    = "apps/web"
  command = "cd ../.. && pnpm install --frozen-lockfile && pnpm build --filter=web"
  publish = ".next"
  ignore  = "npx turbo-ignore"

[build.environment]
  NODE_VERSION            = "20"
  PNPM_VERSION            = "10"
  NEXT_TELEMETRY_DISABLED = "1"

# Locally installed v5 takes precedence over Netlify's auto-managed version.
# Required for monorepo: auto-detection alone doesn't reliably activate OpenNext.
[functions]
  # Raise function timeout to the platform maximum — Claude Vision on multi-page
  # scanned PDFs can take 20-25s. Default (10s) is too short; 26s is the max.
  timeout = 26

[[plugins]]
  package = "@netlify/plugin-nextjs"
