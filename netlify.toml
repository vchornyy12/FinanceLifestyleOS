[build]
  # Install from monorepo root so pnpm workspace deps resolve correctly,
  # then build only the web app via Turbo filter.
  command = "pnpm install --frozen-lockfile && pnpm build --filter=web"
  publish = "apps/web/.next"

[build.environment]
  NODE_VERSION  = "20"
  PNPM_VERSION  = "10"
  NEXT_TELEMETRY_DISABLED = "1"

# Essential Next.js plugin — handles SSR/ISR/Image Optimization on Netlify.
# Netlify auto-installs this; no manual package install needed.
[[plugins]]
  package = "@netlify/plugin-nextjs"
